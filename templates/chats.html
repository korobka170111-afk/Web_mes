<!DOCTYPE html>
<html>
<head>
    <title>Сообщения из Макс</title>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="5">
    <style>
        body { font-family: Arial; margin: 20px; background: #f0f0f0; }
        .message { background: white; margin: 10px 0; padding: 10px; border-radius: 8px; }
        .messenger_name { font-size: 12px; color: #888; }
        .sender { font-weight: bold; color: #007bff; }
        .time { font-size: 12px; color: gray; margin-left: 10px; }
        .text { margin-top: 5px; }
    </style>
</head>
<body>
    <h1>Сообщения из мессенджеров</h1>
    <div id="messages">
        {% for msg in messages %}
        <div class="message">
            <div class="messenger_name">{{ msg[3] }}</div>
            <div class="sender">{{ msg[0] }}</div>
            <div class="time">{{ msg[2] }}</div>
            <div class="text">{{ msg[1] }}</div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
